<!DOCTYPE html>
<html>
<head>
<title>Courier Login</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#4facfe,#00f2fe);
}

.card{
width:350px;
padding:30px;
border-radius:10px;
background:white;
}
</style>
</head>

<body>

<div class="card">

<h3 class="text-center">Courier Login</h3>

<input id="username" class="form-control mt-3" placeholder="Username">

<input id="password" type="password" class="form-control mt-2" placeholder="Password">

<button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>

<p class="text-center mt-3">
Don't have account?
<a href="/register">Register</a>
</p>

</div>

<script>

const API="http://localhost:8080/api/auth/login";

async function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user,
password:pass
})
});

let result=await res.text();

if(result==="success"){
alert("Login Successful");
window.location.href="/dashboard";
}else{
alert("Invalid Username or Password");
}

}

</script>

</body>
</html>
