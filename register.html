<!DOCTYPE html>
<html>
<head>

<title>Courier Register</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#43e97b,#38f9d7);
}

.card{
width:350px;
padding:30px;
border-radius:10px;
background:white;
}

</style>

</head>

<body>

<div class="card">

<h3 class="text-center">Create Account</h3>

<input id="username" class="form-control mt-3" placeholder="Username">

<input id="password" type="password" class="form-control mt-2" placeholder="Password">

<button class="btn btn-success w-100 mt-3" onclick="register()">Register</button>

</div>

<script>

const API="http://localhost:8080/api/auth/register";

async function register(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user,
password:pass
})
});

let result=await res.text();

alert(result);

window.location.href="/";

}

</script>

</body>
</html>
