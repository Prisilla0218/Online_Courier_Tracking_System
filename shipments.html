<!DOCTYPE html>
<html>
<head>

<title>Manage Shipments</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>

body{background:#f4f6f9;}

.delivered{
background:#c8f7c5;
font-weight:bold;
}

.navbar{background:#343a40;}

.navbar a{
color:white;
margin-right:15px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="navbar p-3">

<a href="/dashboard">Dashboard</a>
<a href="/shipments">Shipments</a>
<a href="/">Logout</a>

</div>

<div class="container mt-4">

<h3>Shipment Management</h3>

<form id="shipmentForm">

<input class="form-control mt-2" id="senderName" placeholder="Sender Name" required>

<input class="form-control mt-2" id="receiverName" placeholder="Receiver Name" required>

<input class="form-control mt-2" id="pickupLocation" placeholder="Pickup Location" required>

<input class="form-control mt-2" id="deliveryLocation" placeholder="Delivery Location">

<input type="date" class="form-control mt-2" id="dispatchDate">

<input type="date" class="form-control mt-2" id="deliveryDate">

<select class="form-control mt-2" id="status">

<option value="Dispatched">Dispatched</option>
<option value="In Transit">In Transit</option>
<option value="Delivered">Delivered</option>

</select>

<button class="btn btn-success mt-3">Add Shipment</button>

</form>

<hr>

<input id="searchBox" class="form-control" placeholder="Receiver Name">

<button class="btn btn-secondary mt-2" onclick="searchShipment()">Search</button>

<select id="statusFilter" class="form-control mt-3" onchange="filterStatus()">

<option value="">All Status</option>
<option value="Dispatched">Dispatched</option>
<option value="In Transit">In Transit</option>
<option value="Delivered">Delivered</option>

</select>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Sender</th>
<th>Receiver</th>
<th>Pickup</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="shipmentTable"></tbody>

</table>

</div>

<script>

const API="http://localhost:8080/api/shipments";

shipmentForm.addEventListener("submit",async function(e){

e.preventDefault();

let shipment={

senderName:senderName.value,
receiverName:receiverName.value,
pickupLocation:pickupLocation.value,
deliveryLocation:deliveryLocation.value,
dispatchDate:dispatchDate.value,
deliveryDate:deliveryDate.value,
shipmentStatus:status.value

};

await fetch(API,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(shipment)
});

shipmentForm.reset();

loadShipments();

});

async function loadShipments(){

let res=await fetch(API);
let data=await res.json();

display(data);

}

function display(data){

let table=shipmentTable;

table.innerHTML="";

data.forEach(s=>{

let row=`

<tr class="${s.shipmentStatus==='Delivered'?'delivered':''}">

<td>${s.shipmentId}</td>
<td>${s.senderName}</td>
<td>${s.receiverName}</td>
<td>${s.pickupLocation}</td>
<td>${s.shipmentStatus}</td>

<td>

<button onclick="deleteShipment(${s.shipmentId})"
class="btn btn-danger btn-sm">

Delete

</button>

</td>

</tr>

`;

table.innerHTML+=row;

});

}

async function deleteShipment(id){

await fetch(API+"/"+id,{method:"DELETE"});

loadShipments();

}

async function searchShipment(){

let name=searchBox.value;

let res=await fetch(API+"/search?name="+name);

let data=await res.json();

display(data);

}

async function filterStatus(){

let status=statusFilter.value;

if(status===""){
loadShipments();
return;
}

let res=await fetch(API+"/status?status="+status);

let data=await res.json();

display(data);

}

loadShipments();

</script>

</body>
</html>
